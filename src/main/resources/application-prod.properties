# iBoi - Production Configuration
server.port=${PORT:8080}
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://postgres:5432/iboi}
spring.datasource.username=${DATABASE_USERNAME:iboi}
spring.datasource.password=${DATABASE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.security.jwt.secret=${JWT_SECRET:CHANGE_THIS}
spring.security.jwt.expiration=${JWT_EXPIRATION:43200000}
asaas.enabled=${ASAAS_ENABLED:false}
asaas.base-url=${ASAAS_BASE_URL:https://api.asaas.com}
asaas.api-key=${ASAAS_API_KEY:}
asaas.webhook-token=${ASAAS_WEBHOOK_TOKEN:}
asaas.user-agent=${ASAAS_USER_AGENT:iboi-billing}
