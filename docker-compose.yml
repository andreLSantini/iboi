version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: iboi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-iboi}
      POSTGRES_USER: ${DATABASE_USERNAME:-iboi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iboi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iboi-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iboi-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/iboi
      DATABASE_USERNAME: ${DATABASE_USERNAME:-iboi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-43200000}
      ASAAS_ENABLED: ${ASAAS_ENABLED:-false}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://api-sandbox.asaas.com}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
    ports:
      - "8080:8080"
    networks:
      - iboi-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iboi-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - iboi-network

volumes:
  postgres_data:

networks:
  iboi-network:
    driver: bridge
